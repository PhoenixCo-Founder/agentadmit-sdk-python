# Publish agentadmit to PyPI with Trusted Publishing (OIDC)
#
# Trusted Publishing eliminates long-lived PyPI API tokens.
#
# Prerequisites (one-time setup on pypi.org):
#   1. Create/own the project: agentadmit
#   2. Project settings → Publishing → Add a trusted publisher:
#      - Owner: PhoenixCo-Founder
#      - Repository: agentadmit-sdk-python
#      - Workflow: publish.yml
#      - Environment: (leave blank)
#
# Trigger: push a version tag (e.g., git tag v1.0.0 && git push --tags)
# Action versions are pinned to exact SHAs per supply chain policy.

name: Publish to PyPI

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'

      - name: Check tag matches package version
        run: |
          pkg="v$(python -c 'import tomllib; print(tomllib.load(open("pyproject.toml","rb"))["project"]["version"])')"
          if [ "$pkg" != "$GITHUB_REF_NAME" ]; then
            echo "Tag $GITHUB_REF_NAME does not match pyproject.toml version $pkg" >&2
            exit 1
          fi

      - name: Run tests
        run: |
          python -m pip install -e ".[dev]"
          python -m pytest tests/

      - name: Build sdist and wheel
        run: |
          python -m pip install build
          python -m build

      - name: Clean-install smoke test (runtime deps only)
        run: |
          python -m venv /tmp/smoke
          /tmp/smoke/bin/pip install dist/*.whl
          /tmp/smoke/bin/python -c "import agentadmit, agentadmit.callerconsent, agentadmit.consent, agentadmit.auth; print('clean import OK')"

      - name: Publish with trusted publishing
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
